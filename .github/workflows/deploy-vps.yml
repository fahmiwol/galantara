# Deploy statis ke VPS saat push ke main (atau manual).
# GitHub → Settings → Secrets and variables → Actions:
#   SSH_HOST, SSH_USER, SSH_PRIVATE_KEY (PEM lengkap), REMOTE_PATH (mis. /www/wwwroot/galantara.io/)
name: Deploy VPS (static)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rsync to server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Hilangkan CRLF dari secret (sering kalau paste dari Notepad Windows)
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Pastikan path remote diakhiri /
          REMOTE_PATH="${REMOTE_PATH%/}/"
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          SSH_BASE="-i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o BatchMode=yes"
          DEST="${SSH_USER}@${SSH_HOST}:${REMOTE_PATH}"
          echo "SSH target: ${SSH_USER}@${SSH_HOST} path=${REMOTE_PATH}"
          echo "Testing SSH (BatchMode, no password prompt)..."
          ssh $SSH_BASE "${SSH_USER}@${SSH_HOST}" "echo ssh_ok"
          echo "Running rsync..."
          rsync -avz --delete -e "ssh $SSH_BASE" ./index.html ./about.html ./admin.html "$DEST"
          rsync -avz --delete -e "ssh $SSH_BASE" ./src/ "${DEST}src/"
          rsync -avz --delete -e "ssh $SSH_BASE" ./data/ "${DEST}data/"
          echo "Deploy finished."
