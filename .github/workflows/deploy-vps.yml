# Deploy statis ke VPS saat push ke main (atau manual).
# GitHub → Settings → Secrets and variables → Actions:
#   SSH_HOST, SSH_USER, SSH_PRIVATE_KEY (PEM lengkap), REMOTE_PATH (mis. /www/wwwroot/galantara.io/)
name: Deploy VPS (static)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rsync to server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          SSH_OPTS="-i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
          DEST="${SSH_USER}@${SSH_HOST}:${REMOTE_PATH}"
          rsync -avz --delete -e "ssh $SSH_OPTS" ./index.html ./about.html ./admin.html "$DEST"
          rsync -avz --delete -e "ssh $SSH_OPTS" ./src/ "${DEST}src/"
          rsync -avz --delete -e "ssh $SSH_OPTS" ./data/ "${DEST}data/"
